name: CI

on:
  push:
    branches: [main, story-2/realtime-engine]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_local_ci
      - run: npm audit --audit-level=moderate

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:start
      - run: npm run db:reset
      - run: npm run db:lint
      - run: npm run db:test
      - run: npm run db:types:check
      - name: Export public local client configuration
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$(npx supabase status -o env | sed -n 's/^API_URL="\(.*\)"/\1/p')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(npx supabase status -o env | sed -n 's/^PUBLISHABLE_KEY="\(.*\)"/\1/p')" >> "$GITHUB_ENV"
      - run: npm run test:integration
      - name: Stop local Supabase
        if: always()
        run: npm run db:stop

  browser:
    runs-on: ubuntu-latest
    needs: [quality, database]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:start
      - run: npm run db:reset
      - name: Export public local client configuration
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$(npx supabase status -o env | sed -n 's/^API_URL="\(.*\)"/\1/p')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(npx supabase status -o env | sed -n 's/^PUBLISHABLE_KEY="\(.*\)"/\1/p')" >> "$GITHUB_ENV"
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - name: Stop local Supabase
        if: always()
        run: npm run db:stop
